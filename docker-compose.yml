services:
  backend:
    build:
      context: ./backend
      target: development
    working_dir: /app
    command: >
      sh -c "if [ ! -x node_modules/.bin/tsx ]; then
        npm install;
      fi;
      npm run dev"
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      NODE_ENV: ${NODE_ENV:-development}
      DATA_MODE: ${DATA_MODE:-mock}
      OPENF1_USERNAME: ${OPENF1_USERNAME:-}
      OPENF1_PASSWORD: ${OPENF1_PASSWORD:-}
      OPENF1_TOKEN_URL: ${OPENF1_TOKEN_URL:-https://api.openf1.org/token}
      OPENF1_MQTT_HOST: ${OPENF1_MQTT_HOST:-mqtt.openf1.org}
      OPENF1_MQTT_PORT: ${OPENF1_MQTT_PORT:-8883}
      OPENF1_MQTT_CLIENT_USERNAME: ${OPENF1_MQTT_CLIENT_USERNAME:-pitwall}
      OPENF1_MQTT_WS_URL: ${OPENF1_MQTT_WS_URL:-wss://mqtt.openf1.org:8084/mqtt}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: development
    working_dir: /app
    command: >
      sh -c "if [ ! -x node_modules/.bin/next ]; then
        npm install;
      fi;
      npm run dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-PitWall}
      NEXT_PUBLIC_BACKEND_WS_URL: ${NEXT_PUBLIC_BACKEND_WS_URL:-ws://localhost:3001/ws}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next:
